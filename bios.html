<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Team — Never Let Me Go</title>
  <link rel="stylesheet" href="styles.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Inter:wght@300;400&display=swap" rel="stylesheet" />
</head>
<body>

  <nav class="site-nav">
    <a href="index.html" class="nav-link">Home</a>
    <a href="about.html" class="nav-link">About</a>
    <a href="bios.html" class="nav-link active">Team</a>
    <a href="sources.html" class="nav-link">Sources</a>
  </nav>

  <div id="cursor-glow" class="cursor-glow"></div>

  <header class="bios-hero">
    <p class="bios-hero-eyebrow">the people behind the artifact</p>
    <h1 class="bios-hero-title">Team</h1>
  </header>

  <section class="bios-gallery" aria-label="Team portraits">
    <div class="bios-wall-texture"></div>

    <div class="bios-rail"></div>

    <div class="bios-frames">

      <article class="bios-card bios-card--reveal" style="--tilt: -5deg; --delay: 0s;">
        <div class="bios-wire" aria-hidden="true"></div>
        <div class="bios-frame">
          <div class="bios-photo">
            <img src="IMG_4745.jpg" alt="Portrait of Gabriela Barrios" class="bios-photo-img" loading="lazy" />
          </div>
        </div>
        <div class="bios-caption">
          <h2 class="bios-name">Gabriela Barrios</h2>
          <p class="bios-role">Industrial and Systems Engineering (ISyE)</p>
        </div>
      </article>

      <article class="bios-card bios-card--reveal" style="--tilt: 3deg; --delay: 0.12s;">
        <div class="bios-wire bios-wire--long" aria-hidden="true"></div>
        <div class="bios-frame bios-frame--tall">
          <div class="bios-photo">
            <img src="IMG_1207.JPG" alt="Portrait of Arnav Taduvayi" class="bios-photo-img" loading="lazy" />
          </div>
        </div>
        <div class="bios-caption">
          <h2 class="bios-name">Arnav Taduvayi</h2>
          <p class="bios-role">Computer Science</p>
        </div>
      </article>

      <article class="bios-card bios-card--reveal" style="--tilt: -2deg; --delay: 0.24s;">
        <div class="bios-wire" aria-hidden="true"></div>
        <div class="bios-frame">
          <div class="bios-photo">
            <img src="IMG_4744.jpg" alt="Portrait of Michael Piper" class="bios-photo-img" loading="lazy" />
          </div>
        </div>
        <div class="bios-caption">
          <h2 class="bios-name">Michael Piper</h2>
          <p class="bios-role">Computer Science</p>
        </div>
      </article>

    </div>
  </section>

  <footer class="site-footer">
    <p>&copy; 2026 — Never Let Me Go Project</p>
  </footer>

  <script>
    (() => {
      const glow = document.getElementById("cursor-glow");
      if (glow) {
        let mx = -500, my = -500, gx = -500, gy = -500, active = false, raf = false;
        function tick() {
          raf = false;
          gx += (mx - gx) * 0.16;
          gy += (my - gy) * 0.16;
          glow.style.transform = `translate3d(${gx - 110}px,${gy - 110}px,0)`;
          if (Math.abs(mx - gx) > 0.5 || Math.abs(my - gy) > 0.5) {
            raf = true;
            requestAnimationFrame(tick);
          }
        }
        document.addEventListener("mousemove", (e) => {
          mx = e.clientX; my = e.clientY;
          if (!active) { active = true; glow.classList.add("active"); }
          if (!raf) { raf = true; requestAnimationFrame(tick); }
        }, { passive: true });
        document.addEventListener("mouseleave", () => {
          active = false;
          glow.classList.remove("active");
        });
      }

      const cards = document.querySelectorAll(".bios-card--reveal");
      const obs = new IntersectionObserver(
        (entries) => {
          entries.forEach((en) => {
            if (en.isIntersecting) {
              en.target.classList.add("visible");
              obs.unobserve(en.target);
            }
          });
        },
        { threshold: 0.12 }
      );
      cards.forEach((c) => obs.observe(c));
    })();
  </script>
</body>
</html>
